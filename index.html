<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 50px; }
        .btn { background: #2481cc; color: white; border: none; padding: 15px 30px; border-radius: 10px; cursor: pointer; }
    </style>
</head>
<body>
    <h1>مرحباً <span id="user-name"></span></h1>
    <button class="btn" onclick="saveUser()">تسجيل الدخول للمسابقة</button>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();
        
        // عرض اسم المستخدم فور دخوله
        document.getElementById('user-name').innerText = tg.initDataUnsafe.user.first_name;

        // دالة حفظ البيانات في سحابة تلجرام
        function saveUser() {
            let userId = tg.initDataUnsafe.user.id;
            tg.CloudStorage.setItem("user_" + userId, "participated", (err, result) => {
                if (result) {
                    alert("تم تسجيلك في المسابقة بنجاح!");
                }
            });
        }
    </script>
</body>
</html>
